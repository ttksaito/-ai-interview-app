# Supabase Configuration File
#
# このファイルはSupabaseプロジェクトの設定を管理します
# Supabase CLIを使用する場合は、`supabase init`で自動生成されますが、
# 手動で作成することもできます

project_id = "your-project-id" # Supabaseダッシュボードから取得

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["https://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[edge_runtime]
enabled = true
